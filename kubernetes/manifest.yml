---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: starbucks-deployment
spec:
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: starbucks
  template:
    metadata:
      labels:
        app: starbucks
    spec:
      containers:
      - name: starbucks-container
        image: andyas2501/starbucks:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: starbucks-service
spec:
  type: LoadBalancer
  selector:
    app: starbucks
  ports:
  - port: 80
    targetPort: 3000
